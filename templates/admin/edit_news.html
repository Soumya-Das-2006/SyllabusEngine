{% extends "admin/base.html" %}
{% block admin_content %}
<div class="admin-page-header">
  <div>
    <h1>Edit news article</h1>
    <p class="text-muted">Update the content shown on the public News &amp; Updates page.</p>
  </div>
</div>

<form method="POST" action="{{ url_for('admin.news_edit', news_id=news.id) }}" enctype="multipart/form-data" class="card">
  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{ news.title }}" required>
  </div>
  <div class="form-group">
    <label for="summary">Short description</label>
    <textarea id="summary" name="summary" rows="2">{{ news.summary }}</textarea>
  </div>
  <div class="form-group">
    <label for="content">Content</label>
    <textarea id="content" name="content" rows="10" required>{{ news.content }}</textarea>
  </div>
  <div class="form-group">
    <label for="image">Featured image (optional)</label>
    {% if news.image_url %}
      <div class="mb-2"><img src="{{ url_for('static', filename=news.image_url) }}" alt="Current image" style="max-width:220px;border-radius:8px"></div>
    {% endif %}
    <input type="file" id="image" name="image" accept="image/*">
    <p class="text-muted small">Upload a new image to replace the current one.</p>
  </div>
  <button type="submit" class="btn btn-primary">Save changes</button>
</form>
{% endblock %}
