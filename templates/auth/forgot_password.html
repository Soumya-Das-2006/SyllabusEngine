{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">🔑</span>
      <h1>Forgot Password</h1>
      <p>Enter your email and we'll send a reset link if it exists in our system.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@university.edu" required autocomplete="email" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Send Reset Link
      </button>
    </form>

    <div class="auth-footer">
      Remember your password? <a href="{{ url_for('auth.login') }}"><strong>Log in</strong></a>
    </div>
  </div>
</div>

<script>
  // Auto-focus email
  document.getElementById('email').focus();
</script>

{% endblock %}
