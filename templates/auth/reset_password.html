{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">🔐</span>
      <h1>Reset Password</h1>
      <p>Enter your new password for {{ user.email if user else 'your account' }}.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
      <div class="form-group">
        <label for="password">New password</label>
        <div class="password-container">
          <input type="password" id="password" name="password"
                 placeholder="Minimum 8 characters" required autocomplete="new-password" minlength="8">
          <span class="password-toggle" onclick="togglePasswordVisibility('password')">👁️</span>
        </div>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm new password</label>
        <div class="password-container">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat new password" required autocomplete="new-password">
          <span class="password-toggle" onclick="togglePasswordVisibility('confirm_password')">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Set New Password
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </div>
  </div>
</div>

{% endblock %}
