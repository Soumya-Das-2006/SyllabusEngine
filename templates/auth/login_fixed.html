{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
        <span class="auth-logo">🔐</span>
        <h1>Login</h1>
        <p>Enter your credentials. Role-based access will be applied automatically.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@university.edu" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-container">
          <input type="password" id="password" name="password"
                 placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')" aria-label="Show password" aria-pressed="false" title="Show password">
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="forgot-password">
        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>
      </div>
      <div class="form-check" style="margin-bottom:.75rem">
        <label>
          <input type="checkbox" name="remember">
          Remember me for 7 days
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.signup') }}"><strong>Sign up free</strong></a>
    </div>
  </div>
</div>

{% endblock %}
