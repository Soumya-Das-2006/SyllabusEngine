{% extends "base.html" %}
{% block title %}{{ item.title }}{% endblock %}
{% block body_class %}page-public{% endblock %}
{% block content %}
<div class="page-container page-narrow">
<article class="news-article glass-card p-12 mx-auto max-w-4xl">
    <header class="page-header">
      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 mb-12">
        <div>
          <p class="lp-news-date text-indigo-400 font-bold mb-4">{{ item.created_at.strftime('%b %d, %Y') }}</p>
          <h1 class="hero-title text-4xl lg:text-6xl font-black text-glow neon-glow">{{ item.title }}</h1>
        </div>
      </div>
    </header>

    {% if item.image_url %}
    <div class="news-hero-image">
      <img src="{{ url_for('static', filename=item.image_url) }}" alt="{{ item.title }}">
    </div>
    {% endif %}

    <div class="news-body">
      {{ item.content | safe }}
    </div>
  </article>
</div>
{% endblock %}
